name: ocr_to_anki
description: "Cross-platform OCR to Anki flashcard generator powered by local LLM inference."
publish_to: 'none'
version: 0.1.0+3

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0

  # Local database
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # Image handling
  image_picker: ^1.1.2
  image: ^4.5.3

  # Networking (for AnkiConnect + optional FastAPI)
  http: ^1.4.0
  connectivity_plus: ^6.0.0

  # UI utilities
  file_picker: ^10.0.0
  desktop_drop: ^0.7.0
  share_plus: ^10.0.0
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.28.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/llama-binaries/arm64-v8a/
