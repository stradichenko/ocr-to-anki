# Build OCR-to-Anki release binaries for Linux, macOS, and Windows
name: Build Release

on:
  push:
    tags: ['v*']
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Linux: built inside Nix for maximum reproducibility
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Flutter Linux release
        run: |
          nix develop .#flutter --command bash -c '
            export CC=clang
            export CXX=clang++
            unset cmakeFlags
            unset CMAKE_INSTALL_PREFIX
            cd app
            flutter config --no-analytics
            flutter pub get
            flutter build linux --release
          '

      - name: Bundle native libraries
        run: |
          BUNDLE_DIR="$(find app/build/linux -path '*/release/bundle' -type d | head -1)"
          # Try ldconfig first (works on Ubuntu CI runners), then fall back to a find.
          LIBSTDCXX="$(ldconfig -p 2>/dev/null | grep 'libstdc++.so.6 ' | grep x86-64 | head -1 | awk '{print $NF}')"
          if [ ! -f "$LIBSTDCXX" ]; then
            LIBSTDCXX="$(find /usr/lib /nix/store -name 'libstdc++.so.6' 2>/dev/null | head -1)"
          fi
          if [ -f "$LIBSTDCXX" ]; then
            cp -L "$LIBSTDCXX" "$BUNDLE_DIR/lib/libstdc++.so.6"
            echo "Bundled libstdc++ from: $LIBSTDCXX"
          else
            echo "WARNING: could not find libstdc++.so.6 to bundle"
          fi

      - name: Bundle Python backend source
        run: |
          mkdir -p output/backend
          cp -r src config requirements.txt output/backend/

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-linux-x86_64"
          mkdir -p "output/release/$ARCHIVE"

          # Flutter bundle
          BUNDLE_DIR="$(find app/build/linux -path '*/release/bundle' -type d | head -1)"
          cp -r "$BUNDLE_DIR"/* "output/release/$ARCHIVE/"

          # Backend source
          mkdir -p "output/release/$ARCHIVE/backend"
          cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"

          # Launcher script
          printf '%s\n' '#!/usr/bin/env bash' 'set -euo pipefail' \
            'DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            'export OCR_TO_ANKI_ROOT="$DIR/backend"' \
            'exec "$DIR/ocr_to_anki" "$@"' \
            > "output/release/$ARCHIVE/run.sh"
          chmod +x "output/release/$ARCHIVE/run.sh"

          cd output/release
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # macOS: uses subosito/flutter-action (avoids Nix darwin SDK churn)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter macOS release
        run: |
          cd app
          flutter config --no-analytics
          flutter pub get
          flutter build macos --release

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-macos-arm64"
          mkdir -p "output/release/$ARCHIVE"

          cp -R app/build/macos/Build/Products/Release/*.app "output/release/$ARCHIVE/"

          mkdir -p "output/release/$ARCHIVE/backend"
          cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"

          cd output/release
          zip -qr "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Windows: uses subosito/flutter-action (Nix is not practical on Windows)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Windows release
        run: |
          cd app
          flutter pub get
          flutter build windows --release

      - name: Assemble release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-windows-x86_64"
          mkdir -p "output/release/$ARCHIVE"

          BUNDLE_DIR="$(find app/build/windows -path '*/runner/Release' -type d | head -1)"
          cp -r "$BUNDLE_DIR"/* "output/release/$ARCHIVE/"

          mkdir -p "output/release/$ARCHIVE/backend"
          cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"

          cd output/release
          7z a "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Create GitHub Release (only on tag push)
  # ════════════════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/linux-release/*
            artifacts/macos-release/*
            artifacts/windows-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
