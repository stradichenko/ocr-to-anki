# Build OCR-to-Anki release binaries for Linux, macOS, and Windows
name: Build Release

on:
  push:
    tags: ['v*']
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Linux: uses flutter-action so the binary links against the standard
  # FHS dynamic linker (/lib64/ld-linux-x86-64.so.2) and works on any
  # distro.  Nix builds would hardcode a /nix/store interpreter path.
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Linux release
        run: |
          cd app
          flutter config --no-analytics
          flutter pub get
          flutter build linux --release

      - name: Bundle Python backend source
        run: |
          mkdir -p output/backend
          cp -r src config requirements.txt output/backend/

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-linux-x86_64"
          mkdir -p "output/release/$ARCHIVE"

          # Flutter bundle
          BUNDLE_DIR="$(find app/build/linux -path '*/release/bundle' -type d | head -1)"
          cp -r "$BUNDLE_DIR"/* "output/release/$ARCHIVE/"

          # Backend source
          mkdir -p "output/release/$ARCHIVE/backend"
          cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"

          # Model setup script
          mkdir -p "output/release/$ARCHIVE/scripts"
          cp scripts/setup-llama-cpp.sh "output/release/$ARCHIVE/scripts/"
          chmod +x "output/release/$ARCHIVE/scripts/setup-llama-cpp.sh"

          # NixOS runtime support
          cp nix/nixos-support.nix "output/release/$ARCHIVE/nixos-support.nix"

          # Launcher script (auto-detects NixOS)
          cat > "output/release/$ARCHIVE/run.sh" << 'RUNEOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export OCR_TO_ANKI_ROOT="$DIR/backend"

          # NixOS: shared libraries live in the Nix store, not /usr/lib
          if [ -f /etc/NIXOS ] && [ -z "${_OCR_NIXOS:-}" ]; then
              if [ ! -f "$DIR/nixos-support.nix" ]; then
                  echo "Error: NixOS detected but nixos-support.nix is missing."
                  echo "Run from source instead:  nix develop .#flutter"
                  exit 1
              fi
              echo "NixOS detected — entering Nix environment…"
              export _OCR_NIXOS=1
              export OCR_TO_ANKI_BIN="$DIR/ocr_to_anki"
              exec nix-shell "$DIR/nixos-support.nix" --run "$DIR/ocr_to_anki"
          fi

          exec "$DIR/ocr_to_anki" "$@"
          RUNEOF
          chmod +x "output/release/$ARCHIVE/run.sh"

          cd output/release
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # macOS: uses subosito/flutter-action (avoids Nix darwin SDK churn)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter macOS release
        run: |
          cd app
          flutter config --no-analytics
          flutter pub get
          flutter build macos --release

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-macos-arm64"
          mkdir -p "output/release/$ARCHIVE"

          cp -R app/build/macos/Build/Products/Release/*.app "output/release/$ARCHIVE/"

          mkdir -p "output/release/$ARCHIVE/backend"
          cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"

          mkdir -p "output/release/$ARCHIVE/scripts"
          cp scripts/setup-llama-cpp.sh "output/release/$ARCHIVE/scripts/"
          chmod +x "output/release/$ARCHIVE/scripts/setup-llama-cpp.sh"

          cd output/release
          zip -qr "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Windows: uses subosito/flutter-action (Nix is not practical on Windows)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Windows release
        run: |
          cd app
          flutter config --no-analytics
          flutter pub get
          flutter build windows --release

      - name: Assemble release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-windows-x86_64"
          mkdir -p "output/release/$ARCHIVE"

          BUNDLE_DIR="$(find app/build/windows -path '*/runner/Release' -type d | head -1)"
          if [[ -z "$BUNDLE_DIR" ]] || [[ ! -d "$BUNDLE_DIR" ]]; then
            echo "[ERR] Windows release bundle not found in app/build/windows"
            find app/build/windows -type d || true
            exit 1
          fi
          cp -r "$BUNDLE_DIR"/* "output/release/$ARCHIVE/"

          mkdir -p "output/release/$ARCHIVE/backend"
          cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"

          mkdir -p "output/release/$ARCHIVE/scripts"
          cp scripts/setup-llama-cpp.sh "output/release/$ARCHIVE/scripts/"

          cd output/release
          7z a "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Android: builds native llama.cpp binaries + Flutter APK
  # ════════════════════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.11718014"
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.0.11718014" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build llama.cpp Android binaries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build
          ./scripts/build-llama-android.sh

      - name: Build Flutter APK
        run: |
          cd app
          flutter config --no-analytics
          flutter pub get
          flutter build apk --release

      - name: Assemble Android release
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-android-arm64"
          mkdir -p "output/release/$ARCHIVE"

          APK="app/build/app/outputs/flutter-apk/app-release.apk"
          if [[ ! -f "$APK" ]]; then
            echo "[ERR] APK not found at $APK"
            find app/build -name "*.apk" || true
            exit 1
          fi
          cp "$APK" "output/release/$ARCHIVE/ocr-to-anki-${VERSION}.apk"

          cd output/release
          zip -qr "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Create GitHub Release (only on tag push)
  # ════════════════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/linux-release/*
            artifacts/macos-release/*
            artifacts/windows-release/*
            artifacts/android-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
