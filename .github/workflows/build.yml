# ──────────────────────────────────────────────────────────────────────────────
# Build OCR-to-Anki release binaries for Linux, macOS, and Windows
# ──────────────────────────────────────────────────────────────────────────────
name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.32.0'   # Pin for reproducibility

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Linux — built inside Nix for maximum reproducibility
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: ocr-to-anki
          skipPush: true
        continue-on-error: true

      - name: Build Flutter Linux release
        run: |
          nix develop .#flutter --command bash -c '
            cd app
            flutter pub get
            flutter build linux --release
          '

      - name: Bundle Python backend
        run: |
          nix develop --command bash -c '
            pip install --user pyinstaller
            python3 -m PyInstaller \
              --name ocr-to-anki-backend \
              --distpath output/backend/dist \
              --workpath output/backend/build \
              --specpath output/backend \
              --noconfirm --clean \
              --collect-all uvicorn \
              --collect-all fastapi \
              --collect-all pydantic \
              --hidden-import uvicorn.logging \
              --hidden-import uvicorn.loops.auto \
              --hidden-import uvicorn.protocols.http.auto \
              --hidden-import uvicorn.protocols.websockets.auto \
              --hidden-import uvicorn.lifespan.on \
              --hidden-import src.api.app \
              --hidden-import src.api.models \
              --add-data "src:src" \
              --add-data "config:config" \
              --paths src \
              src/api/app.py
          '

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-linux-x86_64"
          mkdir -p "output/release/$ARCHIVE"

          # Flutter bundle
          cp -r app/build/linux/x64/release/bundle/* "output/release/$ARCHIVE/" \
            || cp -r $(find app/build/linux -path "*/release/bundle" -type d | head -1)/* "output/release/$ARCHIVE/"

          # Backend binary
          if [ -d output/backend/dist/ocr-to-anki-backend ]; then
            cp -r output/backend/dist/ocr-to-anki-backend "output/release/$ARCHIVE/backend"
          else
            mkdir -p "output/release/$ARCHIVE/backend"
            cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"
          fi

          # Launcher script
          cat > "output/release/$ARCHIVE/run.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export OCR_TO_ANKI_ROOT="$DIR/backend"
          if [ -x "$DIR/backend/ocr-to-anki-backend" ]; then
            "$DIR/backend/ocr-to-anki-backend" &
          fi
          exec "$DIR/ocr_to_anki" "$@"
          EOF
          chmod +x "output/release/$ARCHIVE/run.sh"

          cd output/release
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # macOS — uses Nix for Flutter + native macOS toolchain for Xcode build
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14            # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Flutter macOS release
        run: |
          nix develop .#flutter --command bash -c '
            cd app
            flutter pub get
            flutter build macos --release
          '

      - name: Bundle Python backend
        run: |
          nix develop --command bash -c '
            pip3 install --user pyinstaller
            python3 -m PyInstaller \
              --name ocr-to-anki-backend \
              --distpath output/backend/dist \
              --workpath output/backend/build \
              --specpath output/backend \
              --noconfirm --clean \
              --collect-all uvicorn \
              --collect-all fastapi \
              --collect-all pydantic \
              --hidden-import uvicorn.logging \
              --hidden-import uvicorn.loops.auto \
              --hidden-import uvicorn.protocols.http.auto \
              --hidden-import uvicorn.protocols.websockets.auto \
              --hidden-import uvicorn.lifespan.on \
              --hidden-import src.api.app \
              --hidden-import src.api.models \
              --add-data "src:src" \
              --add-data "config:config" \
              --paths src \
              src/api/app.py
          '

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-macos-arm64"
          mkdir -p "output/release/$ARCHIVE"

          # Flutter .app bundle
          cp -R app/build/macos/Build/Products/Release/*.app "output/release/$ARCHIVE/"

          # Backend
          if [ -d output/backend/dist/ocr-to-anki-backend ]; then
            cp -R output/backend/dist/ocr-to-anki-backend "output/release/$ARCHIVE/backend"
          else
            mkdir -p "output/release/$ARCHIVE/backend"
            cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"
          fi

          cd output/release
          zip -qr "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Windows — uses subosito/flutter-action (Nix isn't practical on Windows)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Flutter Windows release
        run: |
          cd app
          flutter pub get
          flutter build windows --release

      - name: Bundle Python backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          python -m PyInstaller `
            --name ocr-to-anki-backend `
            --distpath output/backend/dist `
            --workpath output/backend/build `
            --specpath output/backend `
            --noconfirm --clean `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all pydantic `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import src.api.app `
            --hidden-import src.api.models `
            --add-data "src;src" `
            --add-data "config;config" `
            --paths src `
            src/api/app.py

      - name: Assemble release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.version || 'dev' }}}"
          ARCHIVE="ocr-to-anki-${VERSION}-windows-x86_64"
          mkdir -p "output/release/$ARCHIVE"

          # Flutter build output
          cp -r app/build/windows/x64/runner/Release/* "output/release/$ARCHIVE/" \
            || cp -r $(find app/build/windows -path "*/runner/Release" -type d | head -1)/* "output/release/$ARCHIVE/"

          # Backend
          if [ -d output/backend/dist/ocr-to-anki-backend ]; then
            cp -r output/backend/dist/ocr-to-anki-backend "output/release/$ARCHIVE/backend"
          else
            mkdir -p "output/release/$ARCHIVE/backend"
            cp -r src config requirements.txt "output/release/$ARCHIVE/backend/"
          fi

          cd output/release
          7z a "${ARCHIVE}.zip" "$ARCHIVE"
          echo "ARTIFACT=${ARCHIVE}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: output/release/${{ env.ARTIFACT }}

  # ════════════════════════════════════════════════════════════════════════════
  # Create GitHub Release (only on tag push)
  # ════════════════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/linux-release/*
            artifacts/macos-release/*
            artifacts/windows-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
