version: '3.8'

services:
  ocr-to-anki:
    image: ocr-to-anki:latest
    container_name: ocr-to-anki
    build:
      context: ..
      dockerfile: docker/dockerfile
    
    # Volumes for persistent data
    volumes:
      - config-data:/config
      - app-data:/data
      - ./sample-images:/images:ro
    
    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - XDG_RUNTIME_DIR=/tmp
    
    # Network for X11 forwarding (if needed for GTK)
    network_mode: "host"
    
    # Security options
    security_opt:
      - seccomp:unconfined
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    restart: unless-stopped

volumes:
  config-data:
    driver: local
  app-data:
    driver: local
